appId: com.swellyo.app
name: visual-verify carousel + slider patterns (focused)
tags:
  - visual-verify
---
- launchApp:
    clearState: false
    stopApp: false

# Currently on video selector — back once to land on board carousel
- runFlow:
    when:
      visible: "Select the video.*"
    commands:
      - tapOn:
          id: "onboarding-back-button"
      - waitForAnimationToEnd:
          timeout: 1500

# === BOARD CAROUSEL pattern (4 cards, 3 swipes) ===
- extendedWaitUntil:
    visible: "What is your style.*"
    timeout: 8000

- takeScreenshot: .maestro/screenshots/visual-verify-2026-05-29_185427/board-carousel/card-1-short-board
- swipe:
    direction: LEFT
    duration: 600
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: .maestro/screenshots/visual-verify-2026-05-29_185427/board-carousel/card-2
- swipe:
    direction: LEFT
    duration: 600
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: .maestro/screenshots/visual-verify-2026-05-29_185427/board-carousel/card-3
- swipe:
    direction: LEFT
    duration: 600
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: .maestro/screenshots/visual-verify-2026-05-29_185427/board-carousel/card-4

# Advance: carousel → video selector → video upload → Travel Deets (slider)
- tapOn:
    id: "onboarding-next-button"
- waitForAnimationToEnd:
    timeout: 2500
- tapOn:
    id: "onboarding-next-button"
- waitForAnimationToEnd:
    timeout: 2500
# Video upload step has "Skip"
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 2500

# === SLIDER pattern (5 positions, percentage-based for device independence) ===
- extendedWaitUntil:
    visible: "How many surf trips.*"
    timeout: 8000

# 0% — drag to leftmost
- swipe:
    start: "50%, 73%"
    end: "5%, 73%"
    duration: 600
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: .maestro/screenshots/visual-verify-2026-05-29_185427/travel-slider/0pct

# 25%
- swipe:
    start: "5%, 73%"
    end: "27%, 73%"
    duration: 600
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: .maestro/screenshots/visual-verify-2026-05-29_185427/travel-slider/25pct

# 50%
- swipe:
    start: "27%, 73%"
    end: "50%, 73%"
    duration: 600
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: .maestro/screenshots/visual-verify-2026-05-29_185427/travel-slider/50pct

# 75%
- swipe:
    start: "50%, 73%"
    end: "73%, 73%"
    duration: 600
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: .maestro/screenshots/visual-verify-2026-05-29_185427/travel-slider/75pct

# 100%
- swipe:
    start: "73%, 73%"
    end: "95%, 73%"
    duration: 600
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: .maestro/screenshots/visual-verify-2026-05-29_185427/travel-slider/100pct
