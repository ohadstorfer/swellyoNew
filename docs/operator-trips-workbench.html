<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Operator Trips — Workbench</title>
<style>
  :root{
    --bg:#fff; --panel:#f7f7f5; --panel2:#f0f0ec; --text:#1c1c1a; --muted:#6b6b66;
    --line:#e3e3de; --cyan:#05BCD3; --cyan-dark:#066B8C; --cyan-tint:#E6F4F8;
    --ok:#1f7a4d; --ok-bg:#e8f5ee;
    --open:#b8532b; --open-bg:#fdf0e9;
    --park:#7a6a3f; --park-bg:#f7f2e4;
    --nice:#5a5a90; --nice-bg:#eeeef7;
    --exist:#6b6b66; --exist-bg:#f0f0ec;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:940px;margin:0 auto;padding:40px 20px 100px}

  h1{font-size:26px;letter-spacing:-.02em;font-weight:680;margin-bottom:6px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:20px}
  .sub code{background:var(--panel2);border-radius:4px;padding:1px 5px;
    font:12.5px ui-monospace,Menlo,monospace}

  /* progress */
  .prog{display:flex;align-items:center;gap:12px;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-bottom:22px}
  .bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--cyan);border-radius:99px}
  .prog b{font-size:13px;font-weight:640;white-space:nowrap}
  .prog span{font-size:12.5px;color:var(--muted);white-space:nowrap}

  .legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
  .legend i{font-style:normal;font-size:11.5px;padding:3px 9px;border-radius:99px;
    border:1px solid var(--line);background:var(--panel)}

  /* table */
  .tw{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  table{border-collapse:collapse;width:100%;font-size:14px}
  th{background:var(--panel);text-align:left;padding:9px 14px;font-size:11.5px;
    font-weight:640;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    border-bottom:1px solid var(--line)}
  td{padding:0;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:0}
  tr.grp td{background:var(--panel2);font-weight:640;font-size:12.5px;
    padding:9px 14px;letter-spacing:.01em}
  tr.grp span{font-weight:500;color:var(--muted)}

  button.row{all:unset;display:grid;grid-template-columns:1fr 1.5fr auto auto;
    gap:12px;align-items:center;width:100%;padding:11px 14px;cursor:pointer;
    box-sizing:border-box}
  button.row:hover{background:var(--cyan-tint)}
  button.row:focus-visible{outline:2px solid var(--cyan);outline-offset:-2px}
  .nm{font-weight:580}
  .ds{color:var(--muted);font-size:13.5px}
  .st{font-size:11.5px;font-weight:640;padding:2px 8px;border-radius:99px;white-space:nowrap}
  .s-ok{color:var(--ok);background:var(--ok-bg)}
  .s-open{color:var(--open);background:var(--open-bg)}
  .s-park{color:var(--park);background:var(--park-bg)}
  .s-nice{color:var(--nice);background:var(--nice-bg)}
  .s-exist{color:var(--exist);background:var(--exist-bg)}
  .chk{font-size:13px;width:16px;text-align:center;color:var(--cyan)}
  .chk.no{color:var(--line)}

  /* overlay */
  .back{position:fixed;inset:0;background:rgba(20,20,18,.42);backdrop-filter:blur(2px);
    opacity:0;pointer-events:none;transition:opacity .16s ease;z-index:40}
  .back.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;top:0;right:0;bottom:0;width:min(660px,100%);background:#fff;
    z-index:50;transform:translateX(100%);transition:transform .2s cubic-bezier(.32,.72,0,1);
    display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.12)}
  .sheet.on{transform:none}
  .shead{padding:18px 22px 14px;border-bottom:1px solid var(--line);flex:none}
  .crumb{font-size:11.5px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.07em;font-weight:600;margin-bottom:6px}
  .shead h2{font-size:20px;font-weight:670;letter-spacing:-.015em;margin-bottom:8px}
  .stags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .sbody{padding:20px 22px 40px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
  .sfoot{border-top:1px solid var(--line);padding:10px 22px;display:flex;gap:8px;
    align-items:center;justify-content:space-between;flex:none;background:var(--panel)}
  .sfoot button{all:unset;font-size:13px;font-weight:600;color:var(--cyan-dark);
    padding:6px 12px;border-radius:7px;cursor:pointer}
  .sfoot button:hover{background:var(--cyan-tint)}
  .sfoot button[disabled]{color:var(--line);cursor:default;background:none}
  .x{all:unset;position:absolute;top:16px;right:18px;font-size:20px;line-height:1;
    color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px}
  .x:hover{background:var(--panel2);color:var(--text)}

  .sec{margin-bottom:26px}
  .sec>h3{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;
    font-weight:670;color:var(--muted);margin-bottom:10px;
    padding-bottom:6px;border-bottom:1px solid var(--line)}
  .lead{font-size:14.5px;color:#3a3a36;margin-bottom:22px}

  .item{padding:11px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:0}
  .item h4{font-size:14px;font-weight:620;margin-bottom:4px}
  .item p{font-size:13.5px;color:var(--muted);line-height:1.55}
  .item p+p{margin-top:6px}
  .item a{color:var(--cyan-dark)}
  .item .own{display:inline-block;margin-top:6px;font-size:11.5px;font-weight:620;
    color:var(--cyan-dark);background:var(--cyan-tint);padding:2px 9px;border-radius:99px}
  .item.o{border-left:3px solid var(--open);padding-left:12px;
    background:var(--open-bg);border-radius:0 8px 8px 0;margin-bottom:8px;
    border-bottom:0;padding-top:11px;padding-bottom:11px}
  .item.d{border-left:3px solid var(--ok);padding-left:12px;margin-bottom:8px;
    border-bottom:0}

  .empty{font-size:13.5px;color:var(--muted);background:var(--panel);
    border:1px dashed var(--line);border-radius:9px;padding:16px;text-align:center}

  .src{font-size:12.5px;color:var(--muted);margin-top:8px}
  .src a{color:var(--cyan-dark)}
  code{background:var(--panel2);border-radius:4px;padding:1px 5px;
    font:12.5px ui-monospace,Menlo,monospace}

  @media(max-width:760px){
    button.row{grid-template-columns:1fr auto auto;gap:8px}
    .ds{display:none}
    .sheet{width:100%}
  }
</style>
</head>

<div class="wrap">

    <div class="bar"><i id="pbar"></i></div>

  </div>

  <div class="legend">
    <i>✓ = grilled</i><i class="s-ok st">Decided</i><i class="s-open st">Open</i>
    <i class="s-park st">Parked</i><i class="s-nice st">Nice-to-have</i><i class="s-exist st">Exists</i>
  </div>

  <div class="tw"><table>
    <thead><tr><th>Feature</th><th>What it is</th><th>Status</th><th></th></tr></thead>

  </table></div>
</div>

<div class="back" id="back"></div>
<aside class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="shTitle">

  <div class="sbody" id="shBody"></div>
  <div class="sfoot">
    <button id="prevBtn">← Previous</button>
    <button id="nextBtn">Next →</button>

</aside>

      "lead":"There is ONE list: requirements. The operator picks which ones apply to this trip. Each is either must-have during onboarding, or skippable until a date. There is no separate operator-authored task concept — the traveler's \"Open tasks\" panel in Plan is simply the view of requirements they still owe. Grilled with Ohad across three rounds on 22 July 2026.",

        {"t":"Deadlines are relative to departure, displayed as real dates",

    { "id":"g-storage", "spec":"documents-storage.md", "g":"gates", "n":"Document storage", "grilled":true, "st":"ok",
      "d":"Supabase Storage with RLS — not S3, and never the existing image bucket",
      "lead":"Where passport, insurance, visa and flight files actually live. Decided 22 July after checking what the repo does today. A private bucket is the floor, not the design — most of what matters is around it.",
      "decided":[
        {"t":"Supabase Storage with RLS, not S3","p":["The access rule is \"only the traveler and that trip's operator\". On Supabase Storage that is an RLS policy, the same shape as the ~60 policies already in this project. On S3 there is no notion of our users, so the check has to be hand-written inside an edge function that mints presigned URLs.",
              "S3 was adopted to cut egress on images and video at volume. Documents have none of that pressure — roughly 15 travelers times 4 files per trip, each viewed a handful of times. Putting the most sensitive files in the one place where authorization is custom code instead of a policy is backwards."]},
        {"t":"Never the existing swellyo-images bucket","p":["It is public-read. image-upload-s3/index.ts returns a plain publicUrl at https://swellyo-images.s3.us-east-1.amazonaws.com/<key> with no signature.",
              "Reusing imageService.ts would be the natural shortcut and it would publish passports to the open internet. New bucket, no public read, ever."]},
        {"t":"Signed URLs measured in seconds, not the 3600 default","p":["Every S3 edge function in the repo defaults to expiresIn: 3600. A signed URL is a bearer token — whoever holds the link has the file until it expires, logged in or not.",
              "Mint one per view, valid for about a minute. Related known bug: DM videos are currently presigned with a 7-day expiry."]},
        {"t":"Deletion runs on a lifecycle rule, and the wording is \"within 30 days\"","p":["Application-code deletion is not enough. Object versioning turns a delete into a delete marker, backups and PITR keep a copy inside the retention window, and any CDN in front caches beyond the origin.",
              "Since travelers are now promised a deletion date, the promise has to be one we can actually keep."]},
        {"t":"Documents never touch the image or video pipeline","p":["The Lambda and MediaConvert path writes derivatives to other prefixes on its own schedule. Anything that generates a thumbnail creates copies nobody planned for and nobody applied retention to."]},
        {"t":"Medical is table rows, not storage","p":["Allergies, injuries and medication are an RLS problem, not a bucket problem. It is also the one thing with no export, so it should never become a file at all. Keep the two tracks separate."]}],
      "open":[
        {"t":"Scrub document URLs from Sentry and PostHog","o":"Eyal & Ohad",
         "p":["Both are wired into this app. A signed document URL landing in an error breadcrumb or an analytics event is a working link to a passport for as long as it is valid. Short expiry is half the mitigation; not logging the URL is the other half."]},
        {"t":"Check the backup window against the deletion promise","o":"Eyal & Ohad",
         "p":["Whatever PITR or replication retention is configured sets the real floor on how fast a file can truly disappear."]}]},

    F.filter(function(f){ return f.g === g.id; }).forEach(function(f){
      var idx = order.length; order.push(f);
      var r = document.createElement('tr');
      var td = document.createElement('td'); td.colSpan = 4;
      var b = document.createElement('button');
      b.className = 'row'; b.type = 'button';
      b.innerHTML =
        '<span class="nm">' + esc(f.n) + '</span>' +
        '<span class="ds">' + esc(f.d) + '</span>' +
        '<span class="st ' + ST[f.st][1] + '">' + ST[f.st][0] + '</span>' +
        '<span class="chk' + (f.grilled ? '' : ' no') + '">' + (f.grilled ? '✓' : '·') + '</span>';
      b.addEventListener('click', function(){ open(idx); });
      td.appendChild(b); r.appendChild(td); tb.appendChild(r);
    });
  });

  var done = F.filter(function(f){ return f.grilled; }).length;
  document.getElementById('pcount').textContent = done + ' / ' + F.length;
  document.getElementById('pbar').style.width = (done / F.length * 100) + '%';

  var back = document.getElementById('back'), sheet = document.getElementById('sheet');
  var cur = -1, lastFocus = null;

  function esc(s){ return String(s).replace(/[&<>]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }

  function items(list, cls){
    return list.map(function(i){
      var p = (i.p || []).map(function(x){ return '<p>' + esc(x) + '</p>'; }).join('');
      var own = i.o ? '<span class="own">' + esc(i.o) + '</span>' : '';
      return '<div class="item ' + cls + '"><h4>' + esc(i.t) + '</h4>' + p + own + '</div>';
    }).join('');
  }

  function open(i){
    cur = i; var f = order[i];
    lastFocus = document.activeElement;
    var g = G.filter(function(x){ return x.id === f.g; })[0];

    document.getElementById('shGrp').textContent = g.name + ' · ' + g.meta;
    document.getElementById('shTitle').textContent = f.n;
    document.getElementById('shTags').innerHTML =
      '<span class="st ' + ST[f.st][1] + '">' + ST[f.st][0] + '</span>' +
      '<span class="st ' + (f.grilled ? 's-ok' : 's-exist') + '">' +
      (f.grilled ? '✓ Grilled' : 'Not grilled yet') + '</span>';

    var h = '<p class="lead">' + esc(f.lead) + '</p>';

    h += '<div class="sec"><h3>Decided</h3>' +
      ((f.decided && f.decided.length) ? items(f.decided, 'd')
        : '<div class="empty">Nothing locked yet.</div>') + '</div>';

    h += '<div class="sec"><h3>Open questions</h3>' +
      ((f.open && f.open.length) ? items(f.open, 'o')
        : '<div class="empty">None recorded.</div>') + '</div>';

    if (f.research && f.research.length) {
      h += '<div class="sec"><h3>Research</h3>' + f.research.map(function(r){
        var p = (r.p || []).map(function(x){ return '<p>' + esc(x) + '</p>'; }).join('');
        var s = (r.s || []).length
          ? '<div class="src">Sources: ' + r.s.map(function(x){
              return '<a href="' + esc(x.u) + '" target="_blank" rel="noopener">' + esc(x.l) + '</a>';
            }).join(' · ') + '</div>'
          : '';
        return '<div class="item"><h4>' + esc(r.t) + '</h4>' + p + s + '</div>';
      }).join('') + '</div>';
    }

    h += '<div class="sec"><h3>Spec</h3>' + (f.spec
      ? '<div class="item"><h4><a href="specs/operator-trips/' + esc(f.spec) + '">' +
        esc(f.spec) + '</a></h4><p>Written 22 July 2026. Anything unresolved inside is marked ' +
        'OPEN rather than answered.</p></div>'
      : '<div class="empty">Nothing yet. Blocked on something in the open list above.</div>') +
      '</div>';
    h += '<div class="sec"><h3>Plan</h3><div class="empty">Nothing yet. This is where the ' +
         'implementation plan and the files it touches will live.</div></div>';

    document.getElementById('shBody').innerHTML = h;
    document.getElementById('shBody').scrollTop = 0;
    document.getElementById('prevBtn').disabled = (i === 0);
    document.getElementById('nextBtn').disabled = (i === order.length - 1);

    back.classList.add('on'); sheet.classList.add('on');
    document.body.style.overflow = 'hidden';
    if (location.hash.slice(1) !== f.id) history.replaceState(null, '', '#' + f.id);
    document.getElementById('closeBtn').focus();
  }

  function close(){
    back.classList.remove('on'); sheet.classList.remove('on');
    document.body.style.overflow = '';
    history.replaceState(null, '', location.pathname);
    if (lastFocus) lastFocus.focus();
    cur = -1;
  }

  back.addEventListener('click', close);
  document.getElementById('closeBtn').addEventListener('click', close);
  document.getElementById('prevBtn').addEventListener('click', function(){ if (cur > 0) open(cur - 1); });
  document.getElementById('nextBtn').addEventListener('click', function(){
    if (cur < order.length - 1) open(cur + 1); });
  document.addEventListener('keydown', function(e){
    if (cur < 0) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft' && cur > 0) open(cur - 1);
    if (e.key === 'ArrowRight' && cur < order.length - 1) open(cur + 1);
  });

  var hash = location.hash.slice(1);
  if (hash) {
    for (var k = 0; k < order.length; k++) if (order[k].id === hash) { open(k); break; }
  }
})();
</script>
</body>
</html>
