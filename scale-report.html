<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swellyo — Scale Map</title>
<style>
  :root{
    --bg:#0b1014; --panel:#11181f; --panel2:#0e141a; --line:#1e2a33;
    --txt:#e6edf3; --muted:#8b9aa7; --accent:#36c5f0;
    --green:#2ea043; --green-bg:#0f2417; --yellow:#d4a017; --yellow-bg:#2a2308; --red:#e5484d; --red-bg:#2a0f11;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex}
  a{color:inherit}
  /* sidebar */
  #side{width:280px;flex:0 0 280px;height:100vh;overflow-y:auto;background:var(--panel2);border-right:1px solid var(--line);padding:18px 0}
  #side h1{font-size:15px;letter-spacing:.5px;margin:0 18px 4px;color:var(--txt)}
  #side .sub{font-size:12px;color:var(--muted);margin:0 18px 16px}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border-left:3px solid transparent;font-size:14px}
  .navitem:hover{background:#0f1822}
  .navitem.active{background:#0f1c27;border-left-color:var(--accent)}
  .navitem .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 11px}
  .dot.green{background:var(--green)} .dot.yellow{background:var(--yellow)} .dot.red{background:var(--red)}
  /* main */
  #main{flex:1;height:100vh;overflow-y:auto;padding:36px 44px 80px}
  .wrap{max-width:900px}
  .crumb{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  h2{font-size:26px;margin:0 0 4px;display:flex;align-items:center;gap:12px}
  .desc{color:var(--muted);font-size:14px;margin:14px 0 26px;padding:14px 16px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .breaks{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:14px 16px;margin-bottom:30px}
  .breaks .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:5px}
  .breaks .txt{font-size:15px}
  .secttl{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 12px}
  table{width:100%;border-collapse:separate;border-spacing:0;margin-bottom:30px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th,td{padding:0;text-align:left}
  thead th{background:var(--panel2);color:var(--muted);font-size:12px;font-weight:600;padding:10px 14px;border-bottom:1px solid var(--line)}
  .cell{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top}
  tbody tr:last-child .cell{border-bottom:none}
  .cell.green{background:var(--green-bg)} .cell.yellow{background:var(--yellow-bg)} .cell.red{background:var(--red-bg)}
  .badge{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:13px}
  .badge.green{color:#56d364} .badge.yellow{color:#e3b341} .badge.red{color:#ff7b72}
  .reason{display:block;color:var(--muted);font-size:12.5px;margin-top:6px;line-height:1.45}
  .colhead{width:25%}
  /* evidence */
  details{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 16px;margin-bottom:30px}
  summary{cursor:pointer;padding:14px 0;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"▸ ";color:var(--accent)}
  details[open] summary::before{content:"▾ "}
  .ev{border-top:1px solid var(--line);padding:12px 0;font-size:13.5px}
  .ev .loc{display:block;color:var(--accent);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;margin-top:5px;word-break:break-all}
  /* overview */
  .ovgrid{display:grid;grid-template-columns:1fr;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .ovrow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .ovrow:last-child{border-bottom:none}
  .ovrow:hover{background:#0f1822}
  .ovrow .nm{flex:0 0 230px;font-weight:600}
  .ovrow .bk{flex:1;color:var(--muted);font-size:13px}
  .legend{display:flex;gap:20px;margin:0 0 26px;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  @media(max-width:760px){#side{display:none}#main{padding:24px 18px}.ovrow .nm{flex-basis:140px}}
</style>
</head>

        {n:"3", t:"Receiver-side 6s auto-expiry timer", effort:"S", change:"Stop events are best-effort (a backgrounded / disconnected typer never sends one). Add a per-userId setTimeout(6000) that clears the typer if no refresh arrives; reset on each typing event, clear on explicit stop. Closes the one correctness gap vs WhatsApp.", files:"DirectGroupChat.tsx onTyping handler ~:827 (+ DirectMessageScreen.tsx)", verify:"Start typing on device B, kill B's network; the indicator on A clears within ~6s."},

    },

        ["Trigger inserts one notifications row per trip participant on broadcast — write amplification proportional to trip size per approval","supabase/migrations/20260601010000_notification_center.sql:347-353"],

      ev:[

        ["Per-upload polling loop: 28 attempts × 15s, each a full edge invocation doing an S3 HEAD; no webhook/backoff so concurrency multiplies request load","src/services/storage/storageService.ts:759-789"],

      total:{ "1K":["green",""], "10K":["green",""], "100K":["green",""], "1M":["green","profile read/write is a single-row .eq('user_id').single() on the indexed surfers table; row count is irrelevant"] },

      ev:[

        ["saveSurfer does a full SELECT * read-then-update on every write (extra round-trip + reads all columns to overwrite one field)","src/services/database/supabaseDatabaseService.ts:274"],

      breaks:"At very high concurrency the total open channel count (N own + up to N×50 watch) could approach Supabase Realtime channel limits, but in practice watch channels are only open while a DM is active — actual per-user channel count is much lower than the cap.",

      conc:{ "100":["green",""], "1K":["green","per-user topics: 1K own channels + watch channels only for active DMs; each heartbeat re-broadcasts only to watchers of that specific user, not all 1K"], "10K":["yellow","at 10K concurrent users total open channels could be high if users are actively watching many peers; MAX_SUBSCRIPTIONS=50 hard-caps client-side; server-side channel count is the limit to watch"] },

        ["FIXED — global 'presence:users' channel replaced with per-user topics 'presence:user:{userId}'; fan-out is now O(N) per event, not O(N²)","src/services/presence/userPresenceService.ts:35"],
        ["Own channel: each user tracks only on their own topic (presence:user:{me}); heartbeat re-track fans out only to that user's watchers","src/services/presence/userPresenceService.ts:109"],

const TOTAL_COLS=["1K","10K","100K","1M"];
const CONC_COLS=["100","1K","10K"];
const LIGHT_LABEL={green:"OK",yellow:"Degrades",red:"Breaks"};

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTable(title,cols,obj){
  let h=`<div class="secttl">${title}</div><table><thead><tr>`;
  cols.forEach(c=>h+=`<th class="colhead">${c}</th>`);
  h+=`</tr></thead><tbody><tr>`;
  cols.forEach(c=>{
    const [light,reason]=obj[c];
    h+=`<td class="cell ${light}"><span class="badge ${light}"><span class="dot ${light}"></span>${LIGHT_LABEL[light]}</span>${reason?`<span class="reason">${esc(reason)}</span>`:""}</td>`;
  });
  h+=`</tr></tbody></table>`;
  return h;
}

function renderFlow(f){
  const c=document.getElementById("content");
  let h=`<div class="crumb">Flow</div><h2><span class="dot ${f.overall}"></span>${esc(f.name)}</h2>`;
  h+=`<div class="desc">${esc(f.desc)}</div>`;
  h+=`<div class="breaks"><div class="lbl">What breaks first</div><div class="txt">${esc(f.breaks)}</div></div>`;
  h+=renderTable("Total registered users",TOTAL_COLS,f.total);
  h+=renderTable("Concurrent active users",CONC_COLS,f.conc);
  h+=`<details><summary>Evidence — ${f.ev.length} findings from the code</summary>`;
  f.ev.forEach(([find,loc])=>h+=`<div class="ev">${esc(find)}<span class="loc">${esc(loc)}</span></div>`);
  h+=`</details>`;
  c.innerHTML=h;
  c.parentElement.scrollTop=0;
}

function renderPlan(f){
  const c=document.getElementById("content");
  let h=`<div class="crumb">Implementation plan</div><h2><span class="dot ${f.overall}"></span>${esc(f.name)}</h2>`;
  h+=`<div class="breaks"><div class="lbl">Fit for a small company on Supabase</div><div class="txt">${esc(f.verdict)}</div></div>`;
  h+=`<div class="secttl">Typing cost — before vs after</div><table><thead><tr><th class="colhead"></th><th>Before</th><th>After</th></tr></thead><tbody>`;
  f.cost.forEach(([label,before,after])=>{
    h+=`<tr><td class="cell"><b>${esc(label)}</b></td><td class="cell yellow"><span class="reason" style="margin-top:0">${esc(before)}</span></td><td class="cell green"><span class="reason" style="margin-top:0">${esc(after)}</span></td></tr>`;
  });
  h+=`</tbody></table>`;
  h+=`<div class="secttl">Steps — client-only (no DB / edge / migration)</div><div class="ovgrid">`;
  f.steps.forEach(s=>{
    h+=`<div class="ovrow" style="cursor:default;align-items:flex-start;flex-direction:column;gap:7px">`;
    h+=`<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap"><span class="dot green"></span><span style="font-weight:600">${esc(s.n)}. ${esc(s.t)}</span><span class="reason" style="margin:0;color:var(--accent)">effort ${esc(s.effort)}</span></div>`;
    h+=`<span class="reason" style="margin:0">${esc(s.change)}</span>`;
    h+=`<span class="loc">${esc(s.files)}</span>`;
    h+=`<span class="reason" style="margin:0"><b>Verify:</b> ${esc(s.verify)}</span>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  c.innerHTML=h;
  c.parentElement.scrollTop=0;
}

function renderOverview(){
  const c=document.getElementById("content");
  const flows=DATA.flows.filter(f=>!f.isOverview);
  let h=`<div class="crumb">Swellyo</div><h2>Scale Map — 12 flows</h2>`;
  h+=`<div class="desc">Each flow graded on two axes by an agent that read the actual code, queries, edge functions and realtime subscriptions. Click any flow for its tables + evidence.</div>`;
  h+=`<div class="legend"><span><span class="dot green"></span>OK at this level</span><span><span class="dot yellow"></span>Degrades — works but slow</span><span><span class="dot red"></span>Breaks — unacceptable</span></div>`;
  h+=`<div class="ovgrid">`;
  flows.forEach(f=>{
    h+=`<div class="ovrow" data-go="${f.id}"><span class="dot ${f.overall}"></span><span class="nm">${esc(f.name)}</span><span class="bk">${esc(f.breaks)}</span></div>`;
  });
  h+=`</div>`;
  c.innerHTML=h;
  c.querySelectorAll("[data-go]").forEach(r=>r.onclick=()=>select(r.getAttribute("data-go")));
  c.parentElement.scrollTop=0;
}

function buildNav(){
  const nav=document.getElementById("nav");
  DATA.flows.forEach(f=>{
    const item=el("div","navitem","");
    item.dataset.id=f.id;
    if(f.isOverview){ item.innerHTML=`<span class="nm" style="font-weight:600">▣ ${esc(f.name)}</span>`; }
    else { item.innerHTML=`<span class="dot ${f.overall}"></span><span class="nm">${esc(f.name)}</span>`; }
    item.onclick=()=>select(f.id);
    nav.appendChild(item);
  });
}

function select(id){
  document.querySelectorAll(".navitem").forEach(n=>n.classList.toggle("active",n.dataset.id===id));
  const f=DATA.flows.find(x=>x.id===id);
  if(f.isOverview) renderOverview(); else if(f.isPlan) renderPlan(f); else renderFlow(f);
  location.hash=id;
}

buildNav();
select(location.hash? location.hash.slice(1):"overview");
window.addEventListener("hashchange",()=>{const id=location.hash.slice(1);if(id&&DATA.flows.find(x=>x.id===id))select(id);});
</script>
