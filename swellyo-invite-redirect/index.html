<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0E0E10" />
  <title>Opening Swellyo…</title>

  <!-- Universal Links / App Links handle the happy path before this page ever
       renders. This page only appears when the app is not installed. -->
  <style>
    :root {
      --bg: #0E0E10;
      --bg-2: #1a1a1d;
      --brand: #05BCD3;
      --brand-2: #0788B0;
      --text: #F4F6F7;
      --text-dim: #8A9097;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .wrap {
      width: 100%;
      max-width: 360px;
      animation: fadeUp 360ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      width: 112px;
      height: 112px;
      margin: 0 auto 24px;
      display: block;
      border-radius: 28px;
      box-shadow:
        0 18px 48px rgba(5, 188, 211, 0.18),
        0 0 0 1px rgba(255,255,255,0.04);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    p.sub {
      margin: 0 0 28px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-dim);
    }

    .dots {
      display: inline-flex;
      gap: 6px;
      margin-bottom: 28px;
    }
    .dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--brand);
      opacity: 0.4;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.15s; }
    .dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; transform: scale(0.85); }
      50%      { opacity: 1;    transform: scale(1.1); }
    }

    .cta {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      background: var(--brand);
      color: #06262d;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 120ms ease, filter 120ms ease;
    }
    .cta:hover { filter: brightness(1.08); }
    .cta:active { transform: translateY(1px); }

    .foot {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .foot a {
      color: var(--text-dim);
      text-decoration: underline;
      text-decoration-color: rgba(138, 144, 151, 0.45);
    }
  </style>

  <script>
    (function () {
      var APP_STORE  = "https://apps.apple.com/app/swellyo/id6762285335";
      var PLAY_STORE = "https://play.google.com/store/apps/details?id=com.swellyo.app";
      var MARKETING  = "https://www.swellyo.com";

      var ua = (navigator.userAgent || "").toLowerCase();
      var dest;
      if (/iphone|ipad|ipod/.test(ua)) {
        dest = APP_STORE;
      } else if (/android/.test(ua)) {
        dest = PLAY_STORE;
      } else {
        dest = MARKETING;
      }
      // Defer the redirect a single frame so the page paint has a chance to
      // render (avoids a white flash on slow connections). Universal Links
      // intercept before this runs anyway when the app is installed.
      requestAnimationFrame(function () {
        window.location.replace(dest);
      });

      // Expose for manual fallback button.
      window.__swellyoDest = dest;
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://www.swellyo.com" />
  </noscript>
</head>
<body>
  <div class="wrap">
    <img src="swellyo-logo.png" class="logo" alt="Swellyo" />

    <h1>Opening Swellyo…</h1>
    <p class="sub">Taking you to your surftrip. If you don't have the app yet, we'll send you to the store.</p>

    <div class="dots" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>

    <div>
      <a class="cta" href="https://www.swellyo.com" onclick="if(window.__swellyoDest){this.href=window.__swellyoDest}">
        Continue
      </a>
    </div>

    <p class="foot">
      Or visit <a href="https://www.swellyo.com">swellyo.com</a>
    </p>
  </div>
</body>
</html>
